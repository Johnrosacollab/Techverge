<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - TechVerge</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* Form Overlay container style */
        .form-container-box { 
            background: #151d30; 
            padding: 25px; 
            border-radius: 8px; 
            border: 1px solid #243150; 
            margin: 25px 0; 
            display: none; 
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 6px; color: #8a99ad; font-size: 0.9rem; }
        .form-control { 
            width: 100%; 
            padding: 10px; 
            background: #0b0f19; 
            border: 1px solid #243150; 
            border-radius: 4px; 
            color: #fff; 
            box-sizing: border-box;
        }
        .form-control:focus { border-color: #ff7a00; outline: none; }
        .btn-submit { background: #ff7a00; color: #fff; border: none; padding: 12px 24px; cursor: pointer; border-radius: 4px; font-weight: bold; width: 100%; }
        .btn-submit:hover { background: #e06c00; }
        
        /* Table fixes */
        .admin-table-wrapper { overflow-x: auto; background: #151d30; border-radius: 8px; border: 1px solid #243150; padding: 15px; margin-top: 20px; }
        .admin-table { width: 100%; border-collapse: collapse; text-align: left; }
        .admin-table th, .admin-table td { padding: 12px; border-bottom: 1px solid #243150; color: #fff; }
        .admin-table th { color: #8a99ad; font-size: 0.9rem; }
    </style>
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo"><i class="fas fa-gamepad"></i> TechVerge</a>
            <ul class="nav-menu">
                <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="admin.html" class="active"><i class="fas fa-cog"></i> Admin Dashboard</a></li>
            </ul>
        </div>
    </nav>

    <section class="admin-dashboard" style="max-width: 1200px; margin: 100px auto 40px auto; padding: 0 20px;">
        <h2 style="color: #fff; margin-bottom: 20px;"><i class="fas fa-cog"></i> Admin Dashboard</h2>
        <p style="color: #8a99ad; margin-bottom: 30px;">Manage your gaming website</p>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px;">
            <div style="background: #151d30; padding: 20px; border-radius: 8px; border: 1px solid #243150; text-align: center;">
                <i class="fas fa-gamepad" style="font-size: 2rem; color: #ff7a00;"></i>
                <h3 id="statGames" style="font-size: 2rem; margin: 10px 0; color: #fff;">0</h3>
                <p style="color:#8a99ad;">Total Games</p>
            </div>
            <div style="background: #151d30; padding: 20px; border-radius: 8px; border: 1px solid #243150; text-align: center;">
                <i class="fas fa-layer-group" style="font-size: 2rem; color: #ff7a00;"></i>
                <h3 id="statPlatforms" style="font-size: 2rem; margin: 10px 0; color: #fff;">0</h3>
                <p style="color:#8a99ad;">Platforms</p>
            </div>
            <div style="background: #151d30; padding: 20px; border-radius: 8px; border: 1px solid #243150; text-align: center;">
                <i class="fas fa-cubes" style="font-size: 2rem; color: #ff7a00;"></i>
                <h3 id="statCategories" style="font-size: 2rem; margin: 10px 0; color: #fff;">0</h3>
                <p style="color:#8a99ad;">Categories</p>
            </div>
            <div style="background: #151d30; padding: 20px; border-radius: 8px; border: 1px solid #243150; text-align: center;">
                <i class="fas fa-download" style="font-size: 2rem; color: #ff7a00;"></i>
                <h3 id="statDownloads" style="font-size: 2rem; margin: 10px 0; color: #fff;">0</h3>
                <p style="color:#8a99ad;">Total Downloads</p>
            </div>
        </div>

        <div style="display: flex; gap: 15px; margin-bottom: 20px;">
            <button class="btn btn-primary" onclick="toggleAddGameForm()"><i class="fas fa-plus"></i> Add Game</button>
            <button class="btn" style="background:#243150; color:#fff; border:none; padding:10px 20px; border-radius:4px; cursor:pointer;"><i class="fas fa-file-csv"></i> Export CSV</button>
        </div>

        <div class="form-container-box" id="addGameFormBox">
            <h3 style="color:#ff7a00; margin-bottom:15px;"><i class="fas fa-plus-circle"></i> Add Game to MongoDB Cloud</h3>
            <form id="realAddGameForm" onsubmit="handleRealFormSubmit(event)">
                <div class="form-group">
                    <label>Game Name</label>
                    <input type="text" id="gameName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Platform</label>
                    <input type="text" id="gamePlatform" placeholder="e.g. android, windows, ps5" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <input type="text" id="gameCategory" placeholder="e.g. action, racing" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Rating (Out of 5.0)</label>
                    <input type="number" id="gameRating" step="0.1" max="5" class="form-control" placeholder="4.5" required>
                </div>
                <div class="form-group">
                    <label>Downloads Count</label>
                    <input type="text" id="gameDownloads" placeholder="e.g. 10M+" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Short Description</label>
                    <textarea id="gameDesc" rows="3" class="form-control" required></textarea>
                </div>
                <button type="submit" class="btn-submit">Save to Database</button>
            </form>
        </div>

        <div class="admin-table-wrapper">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Game Name</th>
                        <th>Platform</th>
                        <th>Category</th>
                        <th>Rating</th>
                        <th>Downloads</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="liveAdminTableBody">
                    <tr>
                        <td colspan="6" style="text-align:center; color:#8a99ad; padding:20px;">Loading live database sync...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
