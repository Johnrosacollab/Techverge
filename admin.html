<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - TechVerge</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .form-container-box { background: #151d30; padding: 25px; border-radius: 8px; border: 1px solid #243150; margin: 25px 0; display: none; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 6px; color: #8a99ad; font-size: 0.9rem; }
        .form-control { width: 100%; padding: 10px; background: #0b0f19; border: 1px solid #243150; border-radius: 4px; color: #fff; box-sizing: border-box; }
        .btn-submit { background: #ff7a00; color: #fff; border: none; padding: 12px 24px; cursor: pointer; border-radius: 4px; font-weight: bold; width: 100%; }
        .admin-table-wrapper { overflow-x: auto; background: #151d30; border-radius: 8px; border: 1px solid #243150; padding: 15px; margin-top: 20px; }
        .admin-table { width: 100%; border-collapse: collapse; text-align: left; }
        .admin-table th, .admin-table td { padding: 12px; border-bottom: 1px solid #243150; color: #fff; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo"><i class="fas fa-gamepad"></i> TechVerge</a>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="admin.html" class="active">Admin Dashboard</a></li>
            </ul>
        </div>
    </nav>

    <section class="admin-dashboard" style="max-width: 1200px; margin: 100px auto; padding: 0 20px;">
        <h2 style="color: #fff;"><i class="fas fa-cog"></i> Admin Dashboard</h2>
        
        <div style="display: flex; gap: 15px; margin: 20px 0;">
            <button class="btn btn-primary" onclick="toggleAddGameForm()"><i class="fas fa-plus"></i> Add Game</button>
        </div>

        <div class="form-container-box" id="addGameFormBox">
            <form id="realAddGameForm" onsubmit="handleRealFormSubmit(event)">
                <div class="form-group"><label>Game Name</label><input type="text" id="gameName" class="form-control" required></div>
                <div class="form-group"><label>Platform</label><input type="text" id="gamePlatform" class="form-control" required></div>
                <div class="form-group"><label>Category</label><input type="text" id="gameCategory" class="form-control" required></div>
                <div class="form-group"><label>Rating</label><input type="number" id="gameRating" step="0.1" max="5" class="form-control" required></div>
                <div class="form-group"><label>Downloads</label><input type="text" id="gameDownloads" class="form-control" required></div>
                <div class="form-group"><label>Download URL (Drive / Mega / Mediafire link)</label><input type="url" id="gameDownloadUrl" placeholder="https://..." class="form-control" required></div>
                <div class="form-group"><label>Short Description</label><textarea id="gameDesc" rows="3" class="form-control" required></textarea></div>
                <button type="submit" class="btn-submit">Save to Database</button>
            </form>
        </div>

        <div class="admin-table-wrapper">
            <table class="admin-table">
                <thead>
                    <tr><th>Name</th><th>Platform</th><th>Category</th><th>Rating</th><th>Downloads</th><th>Actions</th></tr>
                </thead>
                <tbody id="liveAdminTableBody"></tbody>
            </table>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
