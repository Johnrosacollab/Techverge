<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechVerge - Gaming Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* Sirf modal ki formatting, baaki sab aapka original css chalega */
        .tv-modal-layer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10000; justify-content: center; align-items: center; }
        .tv-modal-ui { background: #151d30; border: 2px solid #243150; border-radius: 8px; width: 90%; max-width: 480px; padding: 25px; color:#fff; position: relative; }
        .tv-modal-close-trigger { position: absolute; top: 12px; right: 18px; font-size: 1.6rem; color: #8a99ad; cursor: pointer; }
        .tv-popup-dl-btn { display: block; text-align: center; background: #ff7a00; color: #fff !important; text-decoration: none; padding: 12px; border-radius: 4px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo"><i class="fas fa-gamepad"></i> TechVerge</a>
            <ul class="nav-menu">
                <li><a href="index.html" class="active"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="admin.html"><i class="fas fa-cog"></i> Admin Dashboard</a></li>
            </ul>
        </div>
    </nav>

    <section class="featured-games" style="max-width:1200px; margin:100px auto 0 auto; padding: 0 20px;">
        <h2 style="color: #fff; margin-bottom: 25px;"><i class="fas fa-fire" style="color:#ff7a00;"></i> Featured & Trending Games</h2>
        <div class="games-grid" id="featuredGrid">
            </div>
    </section>

    <div class="tv-modal-layer" id="gameDetailModal">
        <div class="tv-modal-ui">
            <span class="tv-modal-close-trigger" onclick="closeGameModal()">&times;</span>
            <h2 id="modalGameTitle" style="color: #ff7a00; margin-bottom: 10px;">Game</h2>
            <p id="modalGamePlatform" style="font-size:0.85rem; color:#8a99ad; margin-bottom:15px;"></p>
            <p id="modalGameDesc" style="line-height:1.5; color:#cbd5e1; margin-bottom:20px;"></p>
            <div style="display:flex; justify-content:space-between; font-size:0.9rem; color:#ff7a00; border-top:1px solid #243150; padding-top:12px;">
                <span id="modalGameRating">⭐ 4.5</span>
                <span id="modalGameDownloads"><i class="fas fa-download"></i> 0</span>
            </div>
            <a href="#" id="modalDownloadBtn" target="_blank" class="tv-popup-dl-btn"><i class="fas fa-download"></i> Download Game File</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
