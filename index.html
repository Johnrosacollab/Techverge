<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechVerge - Download Games</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .featured-games { padding: 40px 20px; max-width: 1200px; margin: 80px auto 0 auto; }
        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .game-card { background: #151d30; border: 1px solid #243150; border-radius: 8px; overflow: hidden; cursor: pointer; transition: 0.3s; padding: 15px; }
        .game-card:hover { transform: translateY(-5px); border-color: #ff7a00; }
        
        /* Modal Popup Dynamic styling box */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: #151d30; border: 2px solid #243150; width: 90%; max-width: 500px; padding: 25px; border-radius: 8px; color: #fff; position: relative; }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; color: #8a99ad; cursor: pointer; }
        .btn-download-now { display: block; text-align: center; background: #ff7a00; color: #fff; text-decoration: none; padding: 12px; border-radius: 4px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo"><i class="fas fa-gamepad"></i> TechVerge</a>
            <ul class="nav-menu">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="admin.html">Admin Dashboard</a></li>
            </ul>
        </div>
    </nav>

    <section class="featured-games">
        <h2 style="color: #fff; margin-bottom: 25px;"><i class="fas fa-fire"></i> Featured & Trending Games</h2>
        <div class="games-grid" id="featuredGrid">
            </div>
    </section>

    <div class="modal-overlay" id="gameDetailModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeGameModal()">&times;</span>
            <h2 id="modalGameTitle" style="color: #ff7a00; margin-bottom: 10px;">Game Title</h2>
            <p id="modalGamePlatform" style="font-size:0.9rem; color:#8a99ad; margin-bottom: 15px;">Platform: </p>
            <p id="modalGameDesc" style="line-height: 1.5; color:#e0e0e0; margin-bottom: 15px;">Description text content.</p>
            <div style="display:flex; justify-content:space-between; font-size:0.9rem; color:#ff7a00; border-top:1px solid #243150; padding-top:10px;">
                <span id="modalGameRating">⭐ 4.5</span>
                <span id="modalGameDownloads"><i class="fas fa-download"></i> 10M+</span>
            </div>
            <a href="#" id="modalDownloadBtn" target="_blank" class="btn-download-now"><i class="fas fa-arrow-alt-circle-down"></i> Download Now</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
